<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeekHub - Anime, Gaming, Movies & TV News</title>
<meta name="description" content="GeekHub brings the latest anime, gaming, movie and TV news.">
<meta name="keywords" content="anime news, gaming news, movie news, tv shows">
<meta name="author" content="GeekHub">
<meta name="robots" content="index, follow">
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f2f2f2;font-size:21px;}
header{background:black;color:white;display:flex;justify-content:space-between;align-items:center;padding:20px;}
.logo{font-size:28px;font-weight:bold;cursor:pointer;}
nav a{color:white;margin-left:15px;text-decoration:none;cursor:pointer;}
.section{padding:20px;}
#articles{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.article-card{background:white;border-radius:10px;overflow:hidden;cursor:pointer;transition:0.2s;}
.article-card:hover{transform:scale(1.03);}
.article-card img{width:100%;height:150px;object-fit:cover;}
.article-card h3{padding:10px;margin:0;}
.article-card p{padding:0 10px 10px;margin:0;font-size:14px;color:gray;}
#articlePage{display:none;padding:20px;}
#articlePage img{width:100%;max-width:700px;margin:10px 0;}
.back{background:black;color:white;border:none;padding:10px 15px;margin-bottom:15px;cursor:pointer;}
.actions{margin:20px 0;}
.actions button{padding:8px 15px;margin-right:10px;cursor:pointer;}
.comment{background:white;padding:10px;margin-bottom:10px;border-radius:6px;}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0JW2ELCCX8"></script>
<script>
window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}
gtag('js',new Date()); gtag('config','G-0JW2ELCCX8');
</script>
</head>
<body>
<header>
<div class="logo" onclick="showHome()">GeekHub</div>
<nav>
<a onclick="showHome()">Home</a>
<a onclick="showCategory('anime')">Anime</a>
<a onclick="showCategory('gaming')">Gaming</a>
<a onclick="showCategory('movies')">Movies</a>
<a onclick="showCategory('tv')">TV</a>
<a onclick="showTrending()">Trending</a>
<a onclick="showLiked()">Most Liked</a>
<a onclick="showCommented()">Most Commented</a>
</nav>
</header>

<section class="section" id="homePage">
<h2 id="sectionTitle">Latest Articles</h2>
<div id="articles"></div>
</section>

<section id="articlePage">
<button class="back" onclick="goHome()">⬅ Back</button>
<div id="articleContent"></div>
<div class="actions">
<button onclick="likeArticle()">👍 Like <span id="likeCount">0</span></button>
<button onclick="favArticle()">⭐ Favourite</button>
</div>
<h3>Comments</h3>
<div id="comments"></div>
<textarea id="commentText" placeholder="Write comment..."></textarea>
<button onclick="addComment()">Post Comment</button>
</section>

<script>
let currentArticle=null,ADMIN_KEY="Gambatukatiyamike03";

async function loadArticles(){
  const res=await fetch("/articles"); const db=await res.json();
  let data={anime:[],gaming:[],movies:[],tv:[]};
  db.forEach(a=>{ if(data[a.category]) data[a.category].push({...a,date:a.id}); });
  return data;
}

function renderArticles(list){
  const container=document.getElementById("articles"); container.innerHTML="";
  if(list.length===0){container.innerHTML="<p>No articles available.</p>"; return;}
  list.forEach(a=>{
    const card=document.createElement("div"); card.className="article-card";
    card.innerHTML=`<img src="${a.image||'https://via.placeholder.com/300x150'}"><h3>${a.title}</h3><p>👍 ${a.likes||0} | 💬 ${(a.comments||[]).length}</p>`;
    card.onclick=()=>openArticle(a); container.appendChild(card);
  });
}

function openArticle(article){
  currentArticle=article;
  document.getElementById("homePage").style.display="none";
  document.getElementById("articlePage").style.display="block";

  const editButton=`<button onclick="requestEdit()">✏️ Edit</button>`;
  const d=new Date(article.date||Date.now());
  const formatted=d.toLocaleDateString("en-US",{year:'numeric',month:'short',day:'numeric'});
  const infoBox=`<div style="display:flex;align-items:center;margin:10px 0;background:#f2f2f2;padding:10px;border-radius:8px;">
<img src="${article.authorImage||'https://via.placeholder.com/50'}" style="width:40px;height:40px;border-radius:50%;margin-right:10px;">
<span>Written by <strong>${article.author||'GeekHub Team'}</strong> | ${formatted}</span></div>`;

  document.getElementById("articleContent").innerHTML=`
    <h1>${article.title}</h1>
    <img src="${article.image||'https://via.placeholder.com/300x150'}">
    ${infoBox}
    <div>${article.content}</div>
    ${editButton}
  `;
  document.getElementById("likeCount").innerText=article.likes||0;
  loadComments();
}

function requestEdit(){let stored=localStorage.getItem("adminKey"); if(stored!==ADMIN_KEY){const key=prompt("Enter admin key:"); if(key===ADMIN_KEY){localStorage.setItem("adminKey",key); alert("Access ✅"); editArticle();}else alert("Wrong ❌");}else editArticle();}
function editArticle(){localStorage.setItem("editArticle",JSON.stringify(currentArticle)); window.location.href="/write.html";}

function goHome(){document.getElementById("homePage").style.display="block";document.getElementById("articlePage").style.display="none";showHome();}

async function likeArticle(){if(!currentArticle)return; await fetch(`/articles/${currentArticle.id}/like`,{method:"POST"}); currentArticle.likes++; document.getElementById("likeCount").innerText=currentArticle.likes;}
async function favArticle(){if(!currentArticle)return; await fetch(`/articles/${currentArticle.id}/favourite`,{method:"POST"}); currentArticle.fav=true; alert("Added ⭐");}
async function addComment(){const t=document.getElementById("commentText").value.trim(); if(!t)return alert("Empty"); if(!currentArticle.comments) currentArticle.comments=[]; await fetch(`/articles/${currentArticle.id}/comment`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({comment:t})}); currentArticle.comments.push(t); document.getElementById("commentText").value=""; loadComments();}
function loadComments(){const box=document.getElementById("comments"); box.innerHTML=""; if(!currentArticle.comments) return; currentArticle.comments.forEach(c=>{const d=document.createElement("div");d.className="comment";d.innerText=c; box.appendChild(d);});}

async function showHome(){document.getElementById("sectionTitle").innerText="Latest Articles"; const data=await loadArticles(); let all=[...data.anime,...data.gaming,...data.movies,...data.tv]; all.sort((a,b)=>b.date-a.date); renderArticles(all);}
async function showCategory(cat){document.getElementById("sectionTitle").innerText=cat.toUpperCase(); const data=await loadArticles(); renderArticles(data[cat]);}
async function showTrending(){document.getElementById("sectionTitle").innerText="Trending"; const data=await loadArticles(); let all=[...data.anime,...data.gaming,...data.movies,...data.tv]; all.forEach(a=>a.score=(a.likes||0)+((a.comments||[]).length*2)+(a.fav?3:0)); all.sort((a,b)=>b.score-a.score); renderArticles(all);}
async function showLiked(){const data=await loadArticles(); let all=[...data.anime,...data.gaming,...data.movies,...data.tv]; all.sort((a,b)=>(b.likes||0)-(a.likes||0)); renderArticles(all);}
async function showCommented(){const data=await loadArticles(); let all=[...data.anime,...data.gaming,...data.movies,...data.tv]; all.sort((a,b)=>((b.comments||[]).length)-((a.comments||[]).length)); renderArticles(all);}
showHome();
</script>
</body>
</html>
